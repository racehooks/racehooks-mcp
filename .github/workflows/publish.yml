name: Release

# Fully automated release on every push to main. semantic-release reads the
# conventional-commit messages since the last release, decides the version bump
# (fix: -> patch, feat: -> minor, feat!:/BREAKING CHANGE -> major), then:
#   1. builds and publishes the npm package (with provenance),
#   2. syncs + publishes server.json to the official MCP registry,
#   3. commits the version bump back and creates the GitHub release + tag.
# Smithery and the downstream aggregators index from the npm package + MCP
# registry on their own schedule, so there is no separate push for them.
# Commits with no releasable changes (docs:, chore:, ci:, ...) publish nothing.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # semantic-release: commit version bump + create tag/release
      issues: write # semantic-release/github: comment on released issues
      pull-requests: write # semantic-release/github: comment on released PRs
      id-token: write # npm provenance + MCP registry GitHub OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # semantic-release v25 requires Node >= 22.14
          cache: npm
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing (OIDC) needs npm CLI >= 11.5.1; Node 22 ships 10.x.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      # No NPM_TOKEN: publishing is authenticated via GitHub OIDC (Trusted
      # Publishing, configured on npmjs.com). id-token: write above provides it,
      # and npm generates provenance automatically.
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
